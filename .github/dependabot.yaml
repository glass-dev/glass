---
version: 2
updates:
  - package-ecosystem: github-actions
    commit-message:
      prefix: dependabot
    cooldown:
      default-days: 7
    directory: /
    groups:
      ci-dependencies:
        patterns:
          - "*"
    labels:
      - dependabot
    schedule:
      interval: monthly
  - package-ecosystem: pre-commit
    commit-message:
      prefix: dependabot
    cooldown:
      default-days: 7
    directory: /
    groups:
      ci-dependencies:
        patterns:
          - "*"
    labels:
      - dependabot
    schedule:
      interval: monthly
