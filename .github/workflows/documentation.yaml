---
name: Documentation

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize

concurrency:
  cancel-in-progress: true
  group: >-
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  docs:
    if: github.event.pull_request.draft == false
    name: Docs
    permissions:
      contents: read
    runs-on: ubuntu-slim
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        # yamllint disable-line rule:line-length
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: 3.14

      - name: Install dependencies
        run: |-
          sudo apt-get update
          sudo apt-get install -y pandoc python3-docutils
          uv sync --only-dev

      - name: Build docs
        run: uv run nox -s docs --verbose
        env:
          FORCE_COLOR: 1

      - name: Spellcheck
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1

      - name: Run Vale
        # yamllint disable-line rule:line-length
        uses: errata-ai/vale-action@85f9f7f2c5f449ac0ae5b66662961bae3f77ca6a # v2.1.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fail_on_error: true
          filter_mode: nofilter
          reporter: github-pr-review
          vale_flags: --glob='!.nox/*'
          version: 3.14.1
